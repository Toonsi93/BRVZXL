<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>707 Brvzil | Official Profile</title>
    <link rel="icon" href="https://i.imgur.com/KJEJEiJ.png" type="image/png">
    
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="enter-screen">
        <h1>BRVZXL</h1>
        <button class="enter-btn" id="enter-btn">Entrer</button>
    </div>

    <div class="video-background">
        <video id="bg-video" loop muted autoplay playsinline webkit-playsinline>
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>
    <div class="video-overlay"></div>

    <div class="container" id="main-container">

        <div class="discord-card">

            <div class="discord-banner">
                <div class="banner-overlay"></div>
            </div>

            <div class="profile-section">
                <div class="profile-img-wrapper">
                    <img src="https://i.pinimg.com/736x/77/60/3b/77603be378aa246c989611fb15b7371b.jpg" alt="𝐁𝐑𝐕𝐙𝐈𝐋" class="profile-image">
                    <div class="status-indicator offline" id="status-indicator"></div>
                    <div class="profile-decoration"></div>
                </div>
                
                <div class="user-info">
                    <div class="name-container">
                        <div class="name">
                            BRVZXL
                        </div>
                    </div>
                    <div class="discord-tag">
                        <i class="fab fa-discord"></i>
                        <span id="discord-username">braziln1.</span>
                    </div>

                    <div class="status-message" id="status-message">
                        <div class="custom-status" id="custom-status">
                            <i class="fas fa-circle"></i>
                            <span id="status-text">Chargement du statut...</span>
                        </div>
                        <div class="activity" id="activity-container" style="display: none;">

                        </div>
                    </div>
                </div>
            </div>

            
            <div style="padding: 0 20px;">
                <div class="player">
                    <div class="player-info">
                        <img id="track-art" src="https://images.genius.com/cf44ff7e1fbed24aa99eabe9ac1dc799.500x500x1.jpg" class="track-cover">
                        <div class="track-text">
                            <h3 id="track-title">Loading...</h3>
                            <p id="track-artist">Artist</p>
                        </div>
                    </div>
                    
                    <div class="progress-area" id="progress-area">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                    
                    <div class="player-controls">
                        <button class="btn-ctrl" id="prev-btn" aria-label="Previous track">
                            <i class="fas fa-step-backward"></i>
                        </button>
                        <button class="btn-ctrl btn-play" id="play-btn" aria-label="Play/Pause">
                            <i class="fas fa-play"></i>
                        </button>
                        <button class="btn-ctrl" id="next-btn" aria-label="Next track">
                            <i class="fas fa-step-forward"></i>
                        </button>
                    </div>
                </div>
            </div>

  
            <div class="social-section">
                <div class="social-title">CONNEXIONS</div>
                <div class="social-grid">
                    <a href="https://discord.gg/rsleak" target="_blank" class="social-item discord">
                        <i class="fab fa-discord"></i>
                        <span></span>
                    </a>
                    <a href="https://www.twitch.tv/brvzil" target="_blank" class="social-item twitch">
                        <i class="fab fa-twitch"></i>
                        <span></span>
                    </a>
                    <a href="https://www.youtube.com/@BRVZILL" target="_blank" class="social-item youtube">
                        <i class="fab fa-youtube"></i>
                        <span></span>
                    </a>
                    <a href="https://www.tiktok.com/@brvzil_tiktok" target="_blank" class="social-item tiktok">
                        <i class="fab fa-tiktok"></i>
                        <span></span>
                    </a>
                </div>
            </div>
        </div>

        <div class="footer">
            © 2026 Developed by 707
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
